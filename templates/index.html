<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 100%;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .content {
            padding: 20px;
        }

        .video-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .video-section {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }

        .video-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            min-width: 0;
        }

        .video-box h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        #vdoninja-container {
            width: 100%;
            height: 400px;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        #vdoninja-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .prediction-box {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .prediction-label {
            font-size: 1.2em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .prediction-class {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 15px;
            word-wrap: break-word;
        }

        .prediction-confidence {
            font-size: 1.2em;
            opacity: 0.95;
        }

        .objects-box {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 15px;
            min-height: 120px;
        }

        .objects-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 12px;
            opacity: 0.95;
        }

        .objects-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 50px;
            align-content: flex-start;
        }

        .object-tag {
            background: rgba(255, 255, 255, 0.25);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.3);
        }

        .status {
            text-align: center;
            padding: 15px;
            background: #e7f3ff;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
            color: #0066cc;
        }

        .status.active {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Video Analysis</h1>
        </div>

        <div class="content">
            <div id="status" class="status">Ready to start</div>

            <div class="controls">
                <button id="startBtn" class="btn btn-primary">Start</button>
                <button id="stopBtn" class="btn btn-danger" style="display:none;">Stop</button>
            </div>

            <div class="video-section">
                <div class="video-box">
                    <h2>Video</h2>
                    <div id="video-container">
                        <video id="videoElement" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
                    </div>
                </div>

                <div class="video-box">
                    <h2>Prediction</h2>
                    <div id="internvlContainer" class="objects-box" style="background: linear-gradient(135deg, #758bbd 0%, #11223d 100%); min-height: 150px;">
                        <div class="objects-title">Scene Description (InternVL):</div>
                        <div id="videoDescription" style="padding: 10px; font-size: 1em; line-height: 1.5; text-align: left;"></div>
                    </div>
                    <div id="objectsContainer" class="objects-box">
                        <div class="objects-title">Detected Objects (RT-DETR):</div>
                        <div id="objectsList" class="objects-list"></div>
                    </div>
                    <div id="vitContainer" class="objects-box" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);">
                        <div class="objects-title">Image Classification (ViT):</div>
                        <div id="vitList" class="objects-list"></div>
                    </div>
                    <div id="actionsContainer" class="objects-box" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">
                        <div class="objects-title">Action Classification (ViViT):</div>
                        <div id="topClassesList" class="objects-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        let stream = null;
        let intervalId = null;
        let videoElement = document.getElementById('videoElement');
        let canvas = document.createElement('canvas');
        let ctx = canvas.getContext('2d');
        let socket = null;
        let isConnected = false;

        const statusDiv = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const topClassesList = document.getElementById('topClassesList');
        const objectsContainer = document.getElementById('objectsContainer');
        const objectsList = document.getElementById('objectsList');
        const vitContainer = document.getElementById('vitContainer');
        const vitList = document.getElementById('vitList');
        const videoDescription = document.getElementById('videoDescription');
        const internvlContainer = document.getElementById('internvlContainer');
        let isDescPending = false;

        function initWebSocket() {
            if (socket && isConnected) {
                return;
            }
            
            socket = io();
            
            socket.on('connect', () => {
                isConnected = true;
                console.log('Connected');
            });
            
            socket.on('disconnect', () => {
                isConnected = false;
                console.log('Disconnected');
            });
            
            socket.on('prediction_update', (prediction) => {
                updatePrediction(prediction);
            });

            socket.on('description_response', (data) => {
                isDescPending = false;
                if (data && data.video_description) {
                    videoDescription.innerHTML = `<span>${data.video_description}</span>`;
                } else {
                    videoDescription.innerHTML = '<span style="opacity: 0.6; font-size: 0.9em;">Waiting...</span>';
                }
            });
            
            socket.on('error', (error) => {
                console.error('WebSocket error:', error);
                updateStatus('Error: ' + error.message, 'error');
            });
        }

        function updateStatus(message, type = 'normal') {
            statusDiv.textContent = message;
            statusDiv.className = 'status';
            if (type === 'active') statusDiv.classList.add('active');
            if (type === 'error') statusDiv.classList.add('error');
        }

        function canUseCamera() {
            const hasMediaDevices = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
            const isSecure = window.isSecureContext; // true for HTTPS or localhost

            if (!hasMediaDevices) {
                updateStatus('Camera unavailable: navigator.mediaDevices.getUserMedia is not supported in this context.', 'error');
                return false;
            }

            if (!isSecure) {
                updateStatus('Camera access requires a secure connection (HTTPS) or localhost. Use HTTPS (e.g. via VPS/Nginx + Certbot) or open the page on the same machine at http://localhost:5000.', 'error');
                return false;
            }

            return true;
        }

        async function startCamera() {
            try {
                if (!canUseCamera()) {
                    return;
                }

                // Always use the rear camera
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });

                videoElement.srcObject = stream;
                updateStatus('Camera active', 'active');
                
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                
                startFrameCapture();
                
            } catch (error) {
                console.error('Camera access error:', error);
                updateStatus('Camera access error: ' + error.message, 'error');
            }
        }

        function captureFrame() {
            if (!videoElement.videoWidth) return null;
            
            // Scale down before sending – max 480px width
            const maxWidth = 480;
            const scale = Math.min(1, maxWidth / videoElement.videoWidth);
            canvas.width = videoElement.videoWidth * scale;
            canvas.height = videoElement.videoHeight * scale;
            ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            
            // Low JPEG quality (0.4) to reduce transmission size
            return canvas.toDataURL('image/jpeg', 0.4);
        }

        async function sendFrameToServer(frameData) {
            try {
                if (!isConnected) {
                    console.warn('Not connected to server');
                    return;
                }
                
                socket.emit('send_frame', { frame: frameData });
            } catch (error) {
                console.error('Error sending frame:', error);
            }
        }

        function updatePrediction(prediction) {
            if (!isDescPending) {
                if (prediction.video_description) {
                    videoDescription.innerHTML = `<span>${prediction.video_description}</span>`;
                } else {
                    videoDescription.innerHTML = '<span style="opacity: 0.6; font-size: 0.9em;">Waiting...</span>';
                }
            }
            
            if (prediction.top_classes && prediction.top_classes.length > 0) {
                const hasRealData = prediction.top_classes[0].confidence > 0;
                if (hasRealData) {
                    topClassesList.innerHTML = prediction.top_classes.map(cls => 
                        `<span class="object-tag">${cls.class} <strong>${(cls.confidence * 100).toFixed(0)}%</strong></span>`
                    ).join('');
                } else {
                    topClassesList.innerHTML = '<span style="opacity: 0.6; font-size: 0.9em;">Waiting...</span>';
                }
            } else {
                topClassesList.innerHTML = '<span style="opacity: 0.6; font-size: 0.9em;">Waiting...</span>';
            }
            
            if (prediction.objects && prediction.objects.length > 0) {
                objectsList.innerHTML = prediction.objects.map(obj => 
                    `<span class="object-tag">${obj.name} <strong>${(obj.confidence * 100).toFixed(0)}%</strong></span>`
                ).join('');
            } else {
                objectsList.innerHTML = '<span style="opacity: 0.6; font-size: 0.9em;">Waiting...</span>';
            }
            
            if (prediction.vit_classes && prediction.vit_classes.length > 0) {
                vitList.innerHTML = prediction.vit_classes.map(cls => 
                    `<span class="object-tag">${cls.class} <strong>${(cls.confidence * 100).toFixed(0)}%</strong></span>`
                ).join('');
            } else {
                vitList.innerHTML = '<span style="opacity: 0.6; font-size: 0.9em;">Waiting...</span>';
            }
        }

        function startFrameCapture() {
            // Send a frame every 300ms (~3 FPS) – reduces data transfer
            intervalId = setInterval(() => {
                const frame = captureFrame();
                if (frame) {
                    sendFrameToServer(frame);
                }
            }, 300);
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
            
            videoElement.srcObject = null;
            updateStatus('Stopped', 'normal');
            
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
            isDescPending = false;
            
            videoDescription.innerHTML = '<span style="opacity: 0.6; font-size: 0.9em;">Waiting...</span>';
            topClassesList.innerHTML = '<span style="opacity: 0.6; font-size: 0.9em;">Waiting...</span>';
            objectsList.innerHTML = '<span style="opacity: 0.6; font-size: 0.9em;">Waiting...</span>';
            vitList.innerHTML = '<span style="opacity: 0.6; font-size: 0.9em;">Waiting...</span>';
        }

        startBtn.addEventListener('click', startCamera);
        stopBtn.addEventListener('click', stopCamera);
        internvlContainer.addEventListener('click', () => {
            if (!isConnected) return;
            isDescPending = true;
            videoDescription.innerHTML = '<span style="opacity: 0.6; font-size: 0.9em;">Generating description...</span>';
            socket.emit('request_description');
        });

        videoDescription.innerHTML = '<span style="opacity: 0.6; font-size: 0.9em;">Waiting...</span>';
        topClassesList.innerHTML = '<span style="opacity: 0.6; font-size: 0.9em;">Waiting...</span>';
        objectsList.innerHTML = '<span style="opacity: 0.6; font-size: 0.9em;">Waiting...</span>';
        vitList.innerHTML = '<span style="opacity: 0.6; font-size: 0.9em;">Waiting...</span>';

        initWebSocket();
        
        setTimeout(() => {
            if (isConnected) {
                updateStatus('Connected to server', 'active');
            } else {
                updateStatus('Waiting for connection...', 'normal');
            }
        }, 1000);
    </script>
</body>
</html>
